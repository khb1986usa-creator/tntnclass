<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털 튼튼교실</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Pretendard','Noto Sans KR',sans-serif;
background:linear-gradient(135deg,#f3f8ff,#edf9f1);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:600px;
background:white;
border-radius:28px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
padding:30px;
}

.badge{
display:inline-block;
background:#e8efff;
color:#2f5cff;
padding:8px 16px;
border-radius:20px;
font-weight:800;
font-size:14px;
margin-bottom:12px;
}

h1{
margin:0;
font-size:28px;
font-weight:900;
}

.subtitle{
color:#6b7280;
font-size:15px;
margin-top:8px;
line-height:1.6;
}

.form{
margin-top:26px;
display:flex;
flex-direction:column;
gap:20px;
width:100%;
}

.field{
display:flex;
flex-direction:column;
gap:10px;
width:100%;
}

label{
font-weight:800;
font-size:15px;
}

input,select{

width:100%;
height:56px;

border:1px solid #d9dee8;
border-radius:18px;

padding:0 18px;

font-size:16px;
font-family:inherit;

background:white;

outline:none;

}

input:focus,select:focus{

border-color:#2563eb;
box-shadow:0 0 0 4px rgba(37,99,235,0.12);

}

.select-wrap{
position:relative;
}

select{
appearance:none;
padding-right:50px;
}

.select-wrap:after{
content:"⌄";
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
font-size:20px;
color:#374151;
pointer-events:none;
}

.helper{
font-size:13px;
color:#6b7280;
}

button{

width:100%;
height:58px;

border:none;
border-radius:18px;

background:linear-gradient(90deg,#2f67e8,#2dc770);

color:white;
font-size:16px;
font-weight:900;

cursor:pointer;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

}

button:disabled{
opacity:0.7;
cursor:not-allowed;
}

.status{
margin-top:10px;
font-size:14px;
font-weight:700;
}

.error{
color:#ef4444;
}

.success{
color:#16a34a;
}

.result{

display:none;

margin-top:18px;

background:#f0f9ff;

border-radius:18px;

padding:18px;

}

.result.show{
display:block;
}

.quote{

font-size:20px;
font-weight:900;
line-height:1.6;

}

.notice{

font-size:13px;
color:#6b7280;
margin-top:8px;

}

</style>

</head>


<body>

<div class="container">

<div class="badge">💪 디지털 튼튼교실</div>

<h1>오늘의 운동 기록</h1>

<p class="subtitle">
이름과 오늘의 운동을 기록해 보세요.<br>
작은 실천이 쌓이면 건강도 레벨업됩니다.
</p>

<form class="form" id="form">

<div class="field">
<label>이름</label>
<input id="name" placeholder="이름 입력">
</div>

<div class="field">
<label>운동 이름</label>
<input id="exercise" placeholder="예: 줄넘기, 걷기">
</div>

<div class="field">

<label>하루 운동 시간</label>

<div class="select-wrap">
<select id="duration"></select>
</div>

<div class="helper">
1분부터 60분까지 선택할 수 있어요.
</div>

</div>

<button id="submitBtn">운동 기록하기</button>

</form>

<div id="status" class="status"></div>

<div id="resultBox" class="result">

<div class="quote" id="message"></div>

<div class="notice">
응답한 내용은 서버에 저장됩니다.
</div>

</div>

</div>


<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbyNRAZkBSgBAUbUMhKs1tsrDrBW2Dia2VOsmnDBP0X2ELbxrkmPVhD4YRruVjrFIS1pgA/exec";

const duration=document.getElementById("duration");

for(let i=1;i<=60;i++){

const opt=document.createElement("option");
opt.value=i;
opt.textContent=i+"분";

duration.appendChild(opt);

}

const form=document.getElementById("form");
const status=document.getElementById("status");
const resultBox=document.getElementById("resultBox");
const message=document.getElementById("message");
const btn=document.getElementById("submitBtn");

form.addEventListener("submit",async e=>{

e.preventDefault();

const name=document.getElementById("name").value.trim();
const exercise=document.getElementById("exercise").value.trim();
const durationValue=duration.value;

if(!name){

status.textContent="이름을 입력하세요";
status.className="status error";
return;

}

if(!exercise){

status.textContent="운동 이름을 입력하세요";
status.className="status error";
return;

}

btn.disabled=true;
btn.textContent="저장 중...";

try{

const res=await fetch(WEB_APP_URL,{

method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify({

name:name,
exercise:exercise,
duration:Number(durationValue)

})

});

const data=await res.json();

if(data.success){

status.textContent="운동 기록 저장 완료!";
status.className="status success";

message.textContent="\""+data.message+"\"";
resultBox.classList.add("show");

form.reset();
duration.value=1;

}else{

status.textContent=data.message;
status.className="status error";

}

}catch(err){

status.textContent="서버 연결 중 오류가 발생했습니다.";
status.className="status error";

}

btn.disabled=false;
btn.textContent="운동 기록하기";

});

duration.value=1;

</script>

</body>
</html>
