<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디지털 튼튼교실</title>
  <style>
    :root {
      --bg-1: #f4f8ff;
      --bg-2: #eefaf3;
      --card: rgba(255, 255, 255, 0.86);
      --text: #1f2937;
      --subtext: #6b7280;
      --primary: #2563eb;
      --primary-2: #22c55e;
      --danger: #ef4444;
      --shadow: 0 20px 50px rgba(37, 99, 235, 0.12);
      --radius-xl: 28px;
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.13), transparent 32%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .app {
      width: 100%;
      max-width: 540px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 28px 22px;
      backdrop-filter: blur(16px);
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.1);
      color: var(--primary);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.2;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--subtext);
      font-size: 15px;
      line-height: 1.6;
    }

    .form {
      margin-top: 24px;
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    .input, .select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      background: white;
      outline: none;
    }

    .input:focus, .select:focus {
      border-color: rgba(37, 99, 235, 0.5);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .helper {
      font-size: 12px;
      color: var(--subtext);
    }

    .button {
      border: none;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), #3b82f6 55%, var(--primary-2));
      box-shadow: 0 12px 25px rgba(37, 99, 235, 0.28);
    }

    .button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      min-height: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--primary-2); }

    .result {
      display: none;
      margin-top: 22px;
      padding: 20px 18px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.09), rgba(34, 197, 94, 0.09));
    }

    .result.show { display: block; }

    .result-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 800;
    }

    .quote {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.6;
      word-break: keep-all;
    }

    .notice {
      margin-top: 14px;
      font-size: 13px;
      color: var(--subtext);
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      body { padding: 14px; align-items: flex-start; }
      .card { padding: 22px 16px; }
      h1 { font-size: 26px; }
      .quote { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="badge">💪 디지털 튼튼교실</div>
      <h1>오늘의 운동 기록</h1>
      <p class="subtitle">
        이름과 오늘의 운동을 기록해 보세요.<br>
        작은 실천이 쌓이면 건강도 레벨업됩니다.
      </p>

      <form class="form" id="exerciseForm">
        <div class="field">
          <label for="name">이름</label>
          <input class="input" type="text" id="name" maxlength="20" placeholder="이름을 입력하세요" required>
        </div>

        <div class="field">
          <label for="exercise">운동 이름</label>
          <input class="input" type="text" id="exercise" maxlength="50" placeholder="예: 줄넘기, 걷기, 플랭크" required>
        </div>

        <div class="field">
          <label for="duration">하루 운동 시간</label>
          <select class="select" id="duration" required>
            <option value="">운동 시간을 선택하세요</option>
          </select>
          <div class="helper">1분부터 60분까지 선택할 수 있어요.</div>
        </div>

        <button class="button" id="submitButton" type="submit">운동 기록하기</button>
      </form>

      <div id="status" class="status" aria-live="polite"></div>

      <section id="resultBox" class="result" aria-live="polite">
        <h2 class="result-title">🔥 오늘의 한마디</h2>
        <p id="messageText" class="quote"></p>
        <p class="notice">응답한 내용은 서버에 저장됩니다.</p>
      </section>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'Yhttps://script.google.com/macros/s/AKfycbyNRAZkBSgBAUbUMhKs1tsrDrBW2Dia2VOsmnDBP0X2ELbxrkmPVhD4YRruVjrFIS1pgA/exec';

    const form = document.getElementById('exerciseForm');
    const durationSelect = document.getElementById('duration');
    const submitButton = document.getElementById('submitButton');
    const statusEl = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const messageText = document.getElementById('messageText');

    for (let i = 1; i <= 60; i++) {
      const option = document.createElement('option');
      option.value = i;
      option.textContent = `${i}분`;
      durationSelect.appendChild(option);
    }

    function setStatus(text, type = '') {
      statusEl.textContent = text;
      statusEl.className = `status ${type}`.trim();
    }

    function showResult(message) {
      messageText.textContent = `"${message}"`;
      resultBox.classList.add('show');
    }

    function resetFormFields() {
      form.reset();
      durationSelect.value = '';
    }

    async function handleSubmit(event) {
      event.preventDefault();

      const name = document.getElementById('name').value.trim();
      const exercise = document.getElementById('exercise').value.trim();
      const duration = Number(document.getElementById('duration').value);

      if (!name) {
        setStatus('이름을 입력해 주세요.', 'error');
        return;
      }

      if (!exercise) {
        setStatus('운동 이름을 입력해 주세요.', 'error');
        return;
      }

      if (!duration || duration < 1 || duration > 60) {
        setStatus('운동 시간을 선택해 주세요.', 'error');
        return;
      }

      try {
        submitButton.disabled = true;
        submitButton.textContent = '저장 중...';
        resultBox.classList.remove('show');
        setStatus('기록을 저장하고 있어요...', 'success');

        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            name,
            exercise,
            duration
          })
        });

        const result = await response.json();

        if (result.success) {
          setStatus('운동 기록이 저장되었어요!', 'success');
          showResult(result.message);
          resetFormFields();
        } else {
          setStatus(result.message || '저장에 실패했습니다.', 'error');
        }
      } catch (error) {
        setStatus('서버 연결 중 오류가 발생했습니다.', 'error');
        console.error(error);
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = '운동 기록하기';
      }
    }

    form.addEventListener('submit', handleSubmit);
  </script>
</body>
</html>
