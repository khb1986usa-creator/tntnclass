<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디지털 튼튼교실</title>

  <style>
    :root {
      --bg-1: #f3f8ff;
      --bg-2: #edf9f1;
      --card-bg: rgba(255, 255, 255, 0.88);
      --text: #1f2937;
      --subtext: #6b7280;
      --line: #d9dee8;
      --primary: #2563eb;
      --secondary: #22c55e;
      --error: #ef4444;
      --success: #16a34a;
      --shadow: 0 18px 45px rgba(31, 41, 55, 0.08);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.10), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 620px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 28px 28px 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #e9efff;
      color: #2f5cff;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--subtext);
      font-size: 15px;
      line-height: 1.65;
    }

    .form {
      margin-top: 28px;
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 10px;
      width: 100%;
    }

    .label {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
    }

    .input,
    .select {
      width: 100%;
      height: 56px;
      border: 1.5px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      padding: 0 18px;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .input::placeholder {
      color: #9aa3b2;
    }

    .input:focus,
    .select:focus {
      border-color: rgba(37, 99, 235, 0.55);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
      transform: translateY(-1px);
    }

    .select-wrap {
      position: relative;
      width: 100%;
    }

    .select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-right: 52px;
      cursor: pointer;
    }

    .select-wrap::after {
      content: "⌄";
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-52%);
      font-size: 22px;
      color: #374151;
      pointer-events: none;
      line-height: 1;
    }

    .helper {
      margin-top: -2px;
      font-size: 13px;
      color: #8a94a6;
      line-height: 1.5;
    }

    .button {
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(90deg, #2f67e8 0%, #3183eb 42%, #2dc770 100%);
      color: #ffffff;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(47, 103, 232, 0.22);
      transition: transform 0.16s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      margin-top: 4px;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 30px rgba(47, 103, 232, 0.26);
    }

    .button:disabled {
      opacity: 0.72;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      min-height: 22px;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 800;
    }

    .status.error {
      color: var(--error);
    }

    .status.success {
      color: var(--success);
    }

    .result {
      display: none;
      margin-top: 18px;
      padding: 18px 18px 16px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(34, 197, 94, 0.08));
      border: 1px solid rgba(37, 99, 235, 0.08);
    }

    .result.show {
      display: block;
    }

    .result-title {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 900;
    }

    .quote {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.6;
      color: #0f172a;
      word-break: keep-all;
    }

    .notice {
      margin-top: 10px;
      font-size: 13px;
      color: var(--subtext);
      line-height: 1.55;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
        align-items: flex-start;
      }

      .card {
        padding: 22px 18px 20px;
        border-radius: 24px;
      }

      h1 {
        font-size: 24px;
      }

      .subtitle {
        font-size: 14px;
      }

      .input,
      .select,
      .button {
        height: 54px;
        font-size: 16px;
      }

      .quote {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="badge">💪 디지털 튼튼교실</div>

      <h1>오늘의 운동 기록</h1>
      <p class="subtitle">
        이름과 오늘의 운동을 기록해 보세요.<br />
        작은 실천이 쌓이면 건강도 레벨업됩니다.
      </p>

      <form class="form" id="form">
        <div class="field">
          <label class="label" for="name">이름</label>
          <input
            class="input"
            id="name"
            type="text"
            placeholder="이름 입력"
            maxlength="20"
          />
        </div>

        <div class="field">
          <label class="label" for="exercise">운동 이름</label>
          <input
            class="input"
            id="exercise"
            type="text"
            placeholder="예: 줄넘기, 걷기"
            maxlength="50"
          />
        </div>

        <div class="field">
          <label class="label" for="duration">하루 운동 시간</label>
          <div class="select-wrap">
            <select class="select" id="duration"></select>
          </div>
          <div class="helper">1분부터 60분까지 선택할 수 있어요.</div>
        </div>

        <button class="button" id="submitBtn" type="submit">운동 기록하기</button>
      </form>

      <div id="status" class="status"></div>

      <div id="resultBox" class="result">
        <div class="result-title">🔥 오늘의 한마디</div>
        <p class="quote" id="message"></p>
        <div class="notice">응답한 내용은 서버에 저장됩니다.</div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL =
      "https://script.google.com/macros/s/AKfycbyNRAZkBSgBAUbUMhKs1tsrDrBW2Dia2VOsmnDBP0X2ELbxrkmPVhD4YRruVjrFIS1pgA/exec";

    const duration = document.getElementById("duration");
    const form = document.getElementById("form");
    const status = document.getElementById("status");
    const resultBox = document.getElementById("resultBox");
    const message = document.getElementById("message");
    const btn = document.getElementById("submitBtn");

    for (let i = 1; i <= 60; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = i + "분";
      duration.appendChild(opt);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const exercise = document.getElementById("exercise").value.trim();
      const durationValue = duration.value;

      if (!name) {
        status.textContent = "이름을 입력하세요.";
        status.className = "status error";
        return;
      }

      if (!exercise) {
        status.textContent = "운동 이름을 입력하세요.";
        status.className = "status error";
        return;
      }

      btn.disabled = true;
      btn.textContent = "저장 중...";
      resultBox.classList.remove("show");

      try {
        const res = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            name: name,
            exercise: exercise,
            duration: Number(durationValue)
          })
        });

        const data = await res.json();

        if (data.success) {
          status.textContent = "운동 기록 저장 완료!";
          status.className = "status success";
          message.textContent = `"${data.message}"`;
          resultBox.classList.add("show");
          form.reset();
          duration.value = "1";
        } else {
          status.textContent = data.message || "저장에 실패했습니다.";
          status.className = "status error";
        }
      } catch (err) {
        status.textContent = "서버 연결 중 오류가 발생했습니다.";
        status.className = "status error";
      }

      btn.disabled = false;
      btn.textContent = "운동 기록하기";
    });

    duration.value = "1";
  </script>
</body>
</html>
