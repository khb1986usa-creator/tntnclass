<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털 튼튼교실</title>

<style>

body{
margin:0;
font-family: 'Pretendard','Noto Sans KR',sans-serif;
background:linear-gradient(135deg,#f4f8ff,#eefaf3);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:520px;
background:white;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
padding:28px;
}

.badge{
display:inline-block;
background:#e8f0ff;
color:#2563eb;
padding:6px 14px;
border-radius:20px;
font-weight:700;
font-size:13px;
margin-bottom:12px;
}

h1{
margin:0;
font-size:28px;
font-weight:800;
}

.subtitle{
color:#6b7280;
font-size:14px;
margin-top:8px;
line-height:1.6;
}

.form{
margin-top:22px;
display:grid;
gap:16px;
}

label{
font-weight:700;
font-size:14px;
}

input,select{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #d1d5db;
font-size:16px;
}

input:focus,select:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

button{
margin-top:6px;
padding:16px;
border:none;
border-radius:16px;
font-size:16px;
font-weight:800;
color:white;
cursor:pointer;
background:linear-gradient(135deg,#2563eb,#22c55e);
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

.status{
margin-top:12px;
font-size:14px;
font-weight:700;
}

.error{color:#ef4444;}
.success{color:#22c55e;}

.result{
margin-top:20px;
padding:20px;
background:#f0f9ff;
border-radius:18px;
display:none;
}

.result.show{
display:block;
}

.quote{
font-size:20px;
font-weight:800;
line-height:1.6;
}

.notice{
font-size:13px;
color:#6b7280;
margin-top:10px;
}

</style>
</head>


<body>

<div class="container">

<div class="badge">💪 디지털 튼튼교실</div>

<h1>오늘의 운동 기록</h1>

<p class="subtitle">
이름과 오늘의 운동을 기록해 보세요.<br>
작은 실천이 쌓이면 건강도 레벨업됩니다.
</p>

<form class="form" id="form">

<div>
<label>이름</label>
<input id="name" placeholder="이름 입력">
</div>

<div>
<label>운동 이름</label>
<input id="exercise" placeholder="예: 줄넘기, 걷기">
</div>

<div>
<label>하루 운동 시간</label>
<select id="duration"></select>
</div>

<button id="submitBtn">운동 기록하기</button>

</form>

<div id="status" class="status"></div>

<div id="resultBox" class="result">

<div class="quote" id="message"></div>

<div class="notice">
응답한 내용은 서버에 저장됩니다.
</div>

</div>

</div>


<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyNRAZkBSgBAUbUMhKs1tsrDrBW2Dia2VOsmnDBP0X2ELbxrkmPVhD4YRruVjrFIS1pgA/exec";

const duration=document.getElementById("duration");

for(let i=1;i<=60;i++){
let opt=document.createElement("option");
opt.value=i;
opt.textContent=i+"분";
duration.appendChild(opt);
}

const form=document.getElementById("form");
const status=document.getElementById("status");
const resultBox=document.getElementById("resultBox");
const message=document.getElementById("message");
const btn=document.getElementById("submitBtn");

form.addEventListener("submit",async e=>{
e.preventDefault();

const name=document.getElementById("name").value.trim();
const exercise=document.getElementById("exercise").value.trim();
const durationValue=duration.value;

if(!name){
status.textContent="이름을 입력하세요";
status.className="status error";
return;
}

if(!exercise){
status.textContent="운동 이름을 입력하세요";
status.className="status error";
return;
}

btn.disabled=true;
btn.textContent="저장 중...";

try{

const res=await fetch(WEB_APP_URL,{
method:"POST",
headers:{
"Content-Type":"text/plain"
},
body:JSON.stringify({
name:name,
exercise:exercise,
duration:Number(durationValue)
})
});

const data=await res.json();

if(data.success){

status.textContent="운동 기록 저장 완료!";
status.className="status success";

message.textContent="\""+data.message+"\"";
resultBox.classList.add("show");

form.reset();

}else{

status.textContent=data.message;
status.className="status error";

}

}catch(err){

status.textContent="서버 연결 중 오류가 발생했습니다.";
status.className="status error";

}

btn.disabled=false;
btn.textContent="운동 기록하기";

});

</script>

</body>
</html>
